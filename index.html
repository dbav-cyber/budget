<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Budget">
<meta name="theme-color" content="#f6f5f1">
<title>Mon Budget</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:#f6f5f1; --card:#ffffff; --line:#e4e1d8; --line-strong:#cfcabb;
  --ink:#23211c; --ink2:#6b6657; --ink3:#9a9483;
  --green:#3b6d11; --green-bg:#eaf3de; --green-line:#97c459;
  --red:#a32d2d; --red-bg:#fcebeb; --red-line:#f09595;
  --amber:#854f0b; --amber-bg:#faeeda; --amber-line:#ef9f27;
  --blue:#185fa5; --blue-bg:#e6f1fb; --blue-line:#85b7eb;
  --radius:10px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);padding:24px 16px 80px;}
.wrap{max-width:760px;margin:0 auto;}
h1{font-size:22px;font-weight:600;margin:0 0 4px;}
.sub{color:var(--ink2);font-size:14px;margin:0 0 20px;}
/* Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:0.5px solid var(--line);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0px);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;background:none;border:none;cursor:pointer;font-size:10px;color:var(--ink3);gap:3px;}
.nav-btn .icon{font-size:22px;line-height:1;}
.nav-btn.active{color:var(--green);}
/* Monthbar */
.monthbar{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.monthbar select,.monthbar button{border:0.5px solid var(--line-strong);background:var(--card);border-radius:var(--radius);padding:8px 12px;font-size:14px;color:var(--ink);cursor:pointer;}
.monthbar button:hover{background:#f0efe9;}
.monthbar .addmonth{margin-left:auto;}
.save-status{font-size:12px;color:var(--ink3);}
/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:24px;}
.metric{background:var(--card);border:0.5px solid var(--line);border-radius:12px;padding:14px 16px;}
.metric .lbl{font-size:12px;color:var(--ink2);margin-bottom:4px;}
.metric .val{font-size:20px;font-weight:600;}
.metric.pos .val{color:var(--green);}
.metric.neg .val{color:var(--red);}
/* Sections */
section{background:var(--card);border:0.5px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:16px;}
section h2{font-size:15px;font-weight:600;margin:0 0 12px;display:flex;align-items:center;justify-content:space-between;}
/* Rows */
.rows{display:flex;flex-direction:column;gap:6px;}
.row{display:flex;align-items:center;gap:6px;}
.row input[type=text]{flex:1;border:0.5px solid var(--line);border-radius:8px;padding:7px 9px;font-size:13.5px;background:var(--bg);}
.row input[type=number]{width:96px;border:0.5px solid var(--line);border-radius:8px;padding:7px 9px;font-size:13.5px;text-align:right;background:var(--bg);}
.row select{border:0.5px solid var(--line);border-radius:8px;padding:7px 9px;font-size:13px;background:var(--bg);color:var(--ink2);}
.row .del{background:none;border:none;color:var(--ink3);cursor:pointer;font-size:16px;padding:2px 5px;}
.row .del:hover{color:var(--red);}
.copy-btn{background:none;border:none;color:var(--ink3);cursor:pointer;font-size:14px;padding:2px 5px;}
.copy-btn:hover{color:var(--blue);}
.copy-btn.ok{color:var(--green);}
.addrow{margin-top:8px;background:none;border:0.5px dashed var(--line-strong);border-radius:8px;padding:7px 10px;font-size:13px;color:var(--ink2);cursor:pointer;width:100%;text-align:left;}
.addrow:hover{background:var(--bg);}
.total{display:flex;justify-content:space-between;border-top:0.5px solid var(--line);margin-top:10px;padding-top:10px;font-size:14px;font-weight:600;}
.pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;}
.pill.green{background:var(--green-bg);color:var(--green);}
.pill.amber{background:var(--amber-bg);color:var(--amber);}
.pill.red{background:var(--red-bg);color:var(--red);}
/* Alerts */
.alert{display:flex;gap:8px;align-items:flex-start;border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:16px;}
.alert.ok{background:var(--green-bg);border:0.5px solid var(--green-line);color:var(--green);}
.alert.warn{background:var(--amber-bg);border:0.5px solid var(--amber-line);color:var(--amber);}
.alert.bad{background:var(--red-bg);border:0.5px solid var(--red-line);color:var(--red);}
/* Footer */
.footer{text-align:center;margin-top:24px;}
.reset{font-size:12px;color:var(--ink3);background:none;border:none;cursor:pointer;text-decoration:underline;}
.small{font-size:11.5px;color:var(--ink3);}
.savings-note{font-size:12.5px;color:var(--ink2);margin-top:8px;}
/* Charts */
.chart-section{background:var(--card);border:0.5px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:16px;}
.chart-section h2{font-size:15px;font-weight:600;margin:0 0 14px;}
.chart-wrap{position:relative;height:220px;}
/* Epargne */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-box{background:var(--card);border:0.5px solid var(--line);border-radius:10px;padding:12px 14px;}
.stat-box .lbl{font-size:11px;color:var(--ink2);margin-bottom:4px;}
.stat-box .val{font-size:18px;font-weight:600;}
.goal-card{background:var(--green-bg);border:0.5px solid var(--green-line);border-radius:12px;padding:16px 18px;margin-bottom:16px;}
.goal-card h2{font-size:15px;font-weight:600;margin:0 0 10px;color:var(--green);}
.goal-bar{height:10px;background:rgba(0,0,0,0.08);border-radius:5px;overflow:hidden;margin:8px 0;}
.goal-fill{height:100%;background:var(--green);border-radius:5px;transition:width 0.5s;}
.goal-row{display:flex;align-items:center;gap:8px;margin-top:12px;}
.goal-row input{flex:1;border:0.5px solid var(--green-line);border-radius:8px;padding:8px 10px;font-size:14px;}
.goal-row button{background:var(--green);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;}
/* Catbar */
.catbreak{display:flex;flex-direction:column;gap:6px;margin-top:12px;}
.catbar-row .top{display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink2);margin-bottom:3px;}
.catbar-track{height:6px;background:var(--bg);border-radius:4px;overflow:hidden;}
.catbar-fill{height:100%;background:var(--blue-line);}
/* Login */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;gap:20px;padding:24px;text-align:center;}
.login-icon{width:72px;height:72px;background:var(--green);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;color:#fff;}
.login-btn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:14px 28px;font-size:15px;cursor:pointer;font-weight:600;width:100%;max-width:280px;}
.login-error{color:var(--red);font-size:13px;display:none;}
</style>
</head>
<body>
<div class="wrap" id="app">
  <p style="text-align:center;color:var(--ink2);padding:60px 0;">Chargement…</p>
</div>

<script>
// ── Firebase ──────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyA9cuO9GzC1pJfGhKRz7rBZtXqHFUhLU8o",
  authDomain: "budget-92cee.firebaseapp.com",
  projectId: "budget-92cee",
  storageBucket: "budget-92cee.firebasestorage.app",
  messagingSenderId: "518937293108",
  appId: "1:518937293108:web:38012a527a65da64e4f561"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ── État global ───────────────────────────────────────────────
let months = {};
let currentKey = null;
let currentUser = null;
let activeTab = 'budget';
let savingsGoal = 0;
let assets = [];
let charts = {};

// ── Utilitaires ───────────────────────────────────────────────
const MOIS = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
function monthLabel(k){ const [y,m]=k.split("-"); return MOIS[parseInt(m,10)-1]+" "+y; }
function fmt(n){ n=parseFloat(n)||0; return n.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+" €"; }
function sum(arr){ return arr.reduce((a,b)=>a+(parseFloat(b.montant)||0),0); }

const COLORS = ["#534AB7","#0F6E56","#993C1D","#993556","#185FA5","#3B6D11","#854F0B","#A32D2D","#26215C","#04342C"];
function dotColor(label){ let h=0; for(let c of (label||'_').toLowerCase()) h=(h*31+c.charCodeAt(0))>>>0; return COLORS[h%COLORS.length]; }

const ASSET_TYPES = ["Retraite (PER)","Immobilier","Bourse / ETF","Livret","Crypto","Autre"];
const ASSET_COLORS = {"Retraite (PER)":"#534AB7","Immobilier":"#ef9f27","Bourse / ETF":"#3b6d11","Livret":"#85b7eb","Crypto":"#f09595","Autre":"#9a9483"};
const CATEGORIES = ["Alimentation","Sorties / loisirs","Shopping","Transport","Santé","Maison","Abonnements","Autre"];

function emptyMonth(solde, epargne){
  return {
    soldeDebut: solde||0,
    revenus:[{label:"Salaire",montant:0}],
    fixes:[{label:"Loyer",montant:0}],
    epargne:[{label:"Épargne",montant:0}],
    cb:[],
    autresVariables:[{label:"Espèces",montant:0}],
    miseDeCotePrecedente: epargne||0
  };
}

function computeTotals(d){
  const soldeDebut = parseFloat(d.soldeDebut)||0;
  const totalRevenusBrut = sum(d.revenus);
  const totalFixes = sum(d.fixes);
  const totalEpargne = sum(d.epargne);
  const totalCB = sum(d.cb);
  const totalAutresVar = sum(d.autresVariables);
  const totalVariable = totalCB + totalAutresVar;
  const resteApresFixe = totalRevenusBrut + soldeDebut - totalFixes - totalEpargne;
  const soldeFin = resteApresFixe - totalVariable;
  const miseDeCoteTotal = (parseFloat(d.miseDeCotePrecedente)||0) + totalEpargne;
  return {totalRevenusBrut,totalFixes,totalEpargne,totalCB,totalAutresVar,totalVariable,resteApresFixe,soldeFin,miseDeCoteTotal};
}

function catBreakdown(cb){
  const map={};
  cb.forEach(i=>{ const c=i.categorie||"Non catégorisé"; map[c]=(map[c]||0)+(parseFloat(i.montant)||0); });
  return Object.entries(map).sort((a,b)=>b[1]-a[1]);
}

// ── Auth ──────────────────────────────────────────────────────
auth.onAuthStateChanged(user=>{
  if(user){ currentUser=user; loadData(); }
  else { currentUser=null; showLogin(); }
});

function showLogin(){
  document.getElementById('app').innerHTML=`
    <div class="login-screen">
      <div class="login-icon">€</div>
      <h1>Mon Budget</h1>
      <p style="color:var(--ink2);margin:0;max-width:280px;">Connecte-toi pour synchroniser ton budget sur tous tes appareils.</p>
      <button class="login-btn" onclick="loginGoogle()">Continuer avec Google</button>
      <p class="login-error" id="login-error"></p>
    </div>`;
}

function loginGoogle(){
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>{
    const el=document.getElementById('login-error');
    if(el){el.style.display='block';el.textContent='Erreur : '+e.message;}
  });
}

// ── Firebase data ─────────────────────────────────────────────
async function loadData(){
  try{
    const snap = await db.collection("budgets").doc(currentUser.uid).collection("data").doc("months").get();
    if(snap.exists) months = snap.data().months||{};
    else months={};
    const sg = await db.collection("budgets").doc(currentUser.uid).collection("data").doc("settings").get();
    if(sg.exists){ savingsGoal = sg.data().savingsGoal||0; assets = sg.data().assets||[]; }
  }catch(e){ months={}; }
  const keys=Object.keys(months).sort();
  if(!keys.length){
    const now=new Date();
    const k=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
    months[k]=emptyMonth(0,0);
    currentKey=k;
  } else { currentKey=keys[keys.length-1]; }
  render();
}

async function save(){
  if(!currentUser) return;
  showSaveStatus('saving');
  try{
    await db.collection("budgets").doc(currentUser.uid).collection("data").doc("months").set({months});
    showSaveStatus('saved');
  }catch(e){ showSaveStatus('error'); }
}

async function saveSettings(){
  if(!currentUser) return;
  try{ await db.collection("budgets").doc(currentUser.uid).collection("data").doc("settings").set({savingsGoal, assets}); }catch(e){}
}

function addAsset(){ assets.push({id:Date.now(),label:"",type:"Bourse / ETF",value:0,perf:0}); saveSettings(); render(); }
function deleteAsset(id){ assets=assets.filter(a=>a.id!==id); saveSettings(); render(); }
function updateAsset(id,field,value){
  const a=assets.find(x=>x.id===id); if(!a) return;
  a[field]=field==='value'||field==='perf'?(parseFloat(value)||0):value;
  saveSettings();
}

function showSaveStatus(s){
  const el=document.getElementById('save-status');
  if(!el) return;
  if(s==='saving'){el.textContent='⏳ Sauvegarde...';el.style.color='var(--ink3)';}
  else if(s==='saved'){el.textContent='✓ Sauvegardé';el.style.color='var(--green)';setTimeout(()=>{el.textContent='';},3000);}
  else{el.textContent='✗ Erreur';el.style.color='var(--red)';}
}

// ── Navigation ────────────────────────────────────────────────
function switchTab(tab){
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});
  charts={};
  activeTab=tab;
  render();
}

function changeMonth(k){ currentKey=k; render(); }

function addNewMonth(){
  const keys=Object.keys(months).sort();
  const [y,m]=keys[keys.length-1].split("-").map(Number);
  let ny=y,nm=m+1; if(nm>12){nm=1;ny++;}
  const nk=ny+"-"+String(nm).padStart(2,"0");
  if(!months[nk]){
    const t=computeTotals(months[keys[keys.length-1]]);
    months[nk]=emptyMonth(t.soldeFin,t.miseDeCoteTotal);
  }
  currentKey=nk; render();
}

function render(){
  const nav=`<nav class="bottom-nav">
    <button class="nav-btn ${activeTab==='budget'?'active':''}" onclick="switchTab('budget')"><span class="icon">💰</span>Budget</button>
    <button class="nav-btn ${activeTab==='graphs'?'active':''}" onclick="switchTab('graphs')"><span class="icon">📊</span>Graphiques</button>
    <button class="nav-btn ${activeTab==='epargne'?'active':''}" onclick="switchTab('epargne')"><span class="icon">🏦</span>Épargne</button>
  </nav>`;
  if(activeTab==='budget') renderBudget(nav);
  else if(activeTab==='graphs') renderGraphs(nav);
  else renderEpargne(nav);
}

// ── Helpers lignes ────────────────────────────────────────────
function rowHTML(section,idx,item,withCat){
  const color=dotColor(item.label);
  const cat=withCat?`<select onchange="updateField('${section}',${idx},'categorie',this.value)">
    <option value="">Catégorie…</option>
    ${CATEGORIES.map(c=>`<option value="${c}" ${item.categorie===c?'selected':''}>${c}</option>`).join('')}
  </select>`:'';
  return `<div class="row">
    <span style="width:9px;height:9px;border-radius:50%;background:${color};flex-shrink:0;"></span>
    <input type="text" value="${(item.label||'').replace(/"/g,'&quot;')}" placeholder="Libellé" oninput="updateField('${section}',${idx},'label',this.value)">
    ${cat}
    <input type="number" step="0.01" value="${item.montant||0}" oninput="updateField('${section}',${idx},'montant',this.value)" onblur="render()">
    <button class="copy-btn" onclick="copyRow('${(item.label||'').replace(/'/g,"\\'")}',${item.montant||0},this)" title="Copier">⎘</button>
    <button class="del" onclick="deleteRow('${section}',${idx})">×</button>
  </div>`;
}

function updateField(section,idx,field,value){
  months[currentKey][section][idx][field]=value;
  save();
}

function deleteRow(section,idx){
  months[currentKey][section].splice(idx,1);
  save(); render();
}

function addRow(section){
  months[currentKey][section].push({label:"",montant:0,...(section==='cb'?{categorie:""}:{})});
  save(); render();
}

function updateSoldeDebut(v){ months[currentKey].soldeDebut=v; save(); }
function updateMiseDeCote(v){ months[currentKey].miseDeCotePrecedente=v; save(); }

function copyRow(label,montant,btn){
  const text=label+' : '+(parseFloat(montant)||0).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
  navigator.clipboard.writeText(text).then(()=>{ btn.textContent='✓'; btn.classList.add('ok'); setTimeout(()=>{btn.textContent='⎘';btn.classList.remove('ok');},1500); });
}

function exportData(){
  const a=document.createElement('a');
  a.href='data:application/json,'+encodeURIComponent(JSON.stringify(months,null,2));
  a.download='budget-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}

function importData(input){
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=async e=>{ try{ months=JSON.parse(e.target.result); const keys=Object.keys(months).sort(); currentKey=keys[keys.length-1]; await save(); render(); }catch(err){ alert("Fichier invalide."); } };
  r.readAsText(file); input.value="";
}

function resetMonth(){ if(!confirm("Réinitialiser ce mois ?")) return; months[currentKey]=emptyMonth(0,0); save(); render(); }

// ── ONGLET BUDGET ─────────────────────────────────────────────
function renderBudget(nav){
  const d=months[currentKey];
  const t=computeTotals(d);
  const keys=Object.keys(months).sort();
  const cbCats=catBreakdown(d.cb);
  const maxCat=cbCats.length?cbCats[0][1]:1;

  let alertHTML='';
  if(t.soldeFin<0) alertHTML=`<div class="alert bad">⚠ Ce mois finit en négatif (${fmt(t.soldeFin)}).</div>`;
  else if((parseFloat(d.soldeDebut)||0)<0) alertHTML=`<div class="alert warn">⚠ Tu démarres en négatif (${fmt(parseFloat(d.soldeDebut)||0)}).</div>`;
  else alertHTML=`<div class="alert ok">✓ Le mois se termine positivement : ${fmt(t.soldeFin)}.</div>`;

  document.getElementById('app').innerHTML=`
    <div class="wrap" style="padding-bottom:80px;">
      <h1>Mon budget</h1>
      <p class="sub">Suivi mensuel des revenus, charges fixes et dépenses variables.</p>
      <div class="monthbar">
        <select onchange="changeMonth(this.value)">${keys.map(k=>`<option value="${k}" ${k===currentKey?'selected':''}>${monthLabel(k)}</option>`).join('')}</select>
        <button class="addmonth" onclick="addNewMonth()">+ Mois suivant</button>
        <span class="save-status" id="save-status"></span>
      </div>
      ${alertHTML}
      <div class="cards">
        <div class="metric"><div class="lbl">Solde début</div><div class="val">${fmt(d.soldeDebut)}</div></div>
        <div class="metric"><div class="lbl">Total recettes</div><div class="val">${fmt(t.totalRevenusBrut)}</div></div>
        <div class="metric"><div class="lbl">Reste à dépenser</div><div class="val">${fmt(t.resteApresFixe)}</div></div>
        <div class="metric ${t.soldeFin>=0?'pos':'neg'}"><div class="lbl">Solde fin</div><div class="val">${fmt(t.soldeFin)}</div></div>
      </div>

      <section>
        <h2>Recettes <span class="pill green">${fmt(t.totalRevenusBrut)}</span></h2>
        <div class="row">
          <input type="text" disabled value="Solde de début de mois" style="color:var(--ink2)">
          <input type="number" step="0.01" value="${d.soldeDebut}" oninput="updateSoldeDebut(this.value)" onblur="render()">
          <span style="width:50px"></span>
        </div>
        <div class="rows">${d.revenus.map((it,i)=>rowHTML('revenus',i,it,false)).join('')}</div>
        <button class="addrow" onclick="addRow('revenus')">+ Ajouter une recette</button>
      </section>

      <section>
        <h2>Charges fixes <span class="pill amber">${fmt(t.totalFixes)}</span></h2>
        <div class="rows">${d.fixes.map((it,i)=>rowHTML('fixes',i,it,false)).join('')}</div>
        <button class="addrow" onclick="addRow('fixes')">+ Ajouter une charge fixe</button>
      </section>

      <section>
        <h2>Épargne <span class="pill green">${fmt(t.totalEpargne)}</span></h2>
        <div class="rows">${d.epargne.map((it,i)=>rowHTML('epargne',i,it,false)).join('')}</div>
        <button class="addrow" onclick="addRow('epargne')">+ Ajouter une ligne d'épargne</button>
        <p class="savings-note">Solde d'épargne cumulé : <strong>${fmt(t.miseDeCoteTotal)}</strong></p>
        <div class="row" style="margin-top:6px;">
          <input type="text" disabled value="Solde d'épargne en début de mois" style="color:var(--ink2)">
          <input type="number" step="0.01" value="${d.miseDeCotePrecedente}" oninput="updateMiseDeCote(this.value)" onblur="render()">
          <span style="width:50px"></span>
        </div>
        <p class="small">Modifie si ton solde réel diffère du calcul automatique.</p>
      </section>

      <section>
        <h2>Dépenses CB <span class="pill red">${fmt(t.totalCB)}</span></h2>
        <div class="rows">${d.cb.map((it,i)=>rowHTML('cb',i,it,true)).join('')}</div>
        <button class="addrow" onclick="addRow('cb')">+ Ajouter une dépense CB</button>
        ${cbCats.length?`<div class="catbreak">${cbCats.map(([cat,val])=>`
          <div class="catbar-row">
            <div class="top"><span>${cat}</span><span>${fmt(val)}</span></div>
            <div class="catbar-track"><div class="catbar-fill" style="width:${Math.round(val/maxCat*100)}%"></div></div>
          </div>`).join('')}</div>`:'<p class="small">Catégorise chaque dépense pour visualiser où va ton argent.</p>'}
      </section>

      <section>
        <h2>Autres dépenses <span class="pill red">${fmt(t.totalAutresVar)}</span></h2>
        <div class="rows">${d.autresVariables.map((it,i)=>rowHTML('autresVariables',i,it,false)).join('')}</div>
        <button class="addrow" onclick="addRow('autresVariables')">+ Ajouter une dépense</button>
        <div class="total"><span>Total dépenses du mois</span><span>${fmt(t.totalVariable+t.totalFixes)}</span></div>
      </section>

      <div class="footer">
        <button class="reset" onclick="exportData()">Exporter</button> ·
        <label class="reset" style="cursor:pointer;">Importer<input type="file" accept=".json" onchange="importData(this)" style="display:none;"></label> ·
        <button class="reset" onclick="resetMonth()">Réinitialiser</button> ·
        <button class="reset" onclick="auth.signOut()">Déconnexion</button>
        <p class="small">Connecté : ${currentUser?currentUser.email:''}</p>
      </div>
    </div>
    ${nav}`;
}

// ── ONGLET GRAPHIQUES ─────────────────────────────────────────
function renderGraphs(nav){
  const d=months[currentKey];
  const t=computeTotals(d);
  const keys=Object.keys(months).sort();
  const cbCats=catBreakdown(d.cb);

  document.getElementById('app').innerHTML=`
    <div class="wrap" style="padding-bottom:80px;">
      <h1>Graphiques</h1>
      <div class="monthbar">
        <select onchange="changeMonth(this.value)">${keys.map(k=>`<option value="${k}" ${k===currentKey?'selected':''}>${monthLabel(k)}</option>`).join('')}</select>
      </div>
      <div class="chart-section"><h2>Répartition des dépenses</h2><div class="chart-wrap"><canvas id="c1"></canvas></div></div>
      <div class="chart-section"><h2>Recettes vs Dépenses</h2><div class="chart-wrap"><canvas id="c2"></canvas></div></div>
      <div class="chart-section"><h2>CB par catégorie</h2><div class="chart-wrap"><canvas id="c3"></canvas></div></div>
    </div>
    ${nav}`;

  charts.c1=new Chart(document.getElementById('c1'),{type:'doughnut',data:{
    labels:['Charges fixes','Épargne','Dépenses CB','Autres'],
    datasets:[{data:[t.totalFixes,t.totalEpargne,t.totalCB,t.totalAutresVar],backgroundColor:['#ef9f27','#97c459','#f09595','#85b7eb'],borderWidth:0}]
  },options:{plugins:{legend:{position:'bottom'}},cutout:'60%'}});

  charts.c2=new Chart(document.getElementById('c2'),{type:'bar',data:{
    labels:['Recettes','Fixes','Épargne','Variables','Solde fin'],
    datasets:[{data:[t.totalRevenusBrut,t.totalFixes,t.totalEpargne,t.totalVariable,t.soldeFin],
    backgroundColor:['#97c459','#ef9f27','#85b7eb','#f09595',t.soldeFin>=0?'#3b6d11':'#a32d2d'],borderWidth:0,borderRadius:6}]
  },options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});

  const cbL=cbCats.map(([k])=>k||'Non catégorisé');
  const cbV=cbCats.map(([,v])=>v);
  charts.c3=new Chart(document.getElementById('c3'),{type:'bar',data:{
    labels:cbL.length?cbL:['Aucune dépense CB'],
    datasets:[{data:cbV.length?cbV:[0],backgroundColor:'#85b7eb',borderWidth:0,borderRadius:6}]
  },options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true}}}});
}

// ── ONGLET ÉPARGNE ────────────────────────────────────────────
function renderEpargne(nav){
  const keys=Object.keys(months).sort();
  const totalPatrimoine=assets.reduce((s,a)=>s+(parseFloat(a.value)||0),0);
  const totalPerf=assets.reduce((s,a)=>s+(parseFloat(a.perf)||0),0);
  const perfPct=totalPatrimoine>0?((totalPerf/(totalPatrimoine-totalPerf))*100):0;

  // Regrouper par type
  const byType={};
  assets.forEach(a=>{ const t=a.type||"Autre"; byType[t]=(byType[t]||0)+(parseFloat(a.value)||0); });
  const typeEntries=Object.entries(byType).sort((a,b)=>b[1]-a[1]);

  // Historique épargne (depuis budget)
  const history=keys.map(k=>{ const mt=computeTotals(months[k]); return {label:monthLabel(k),ajout:sum(months[k].epargne)}; });
  const last3=keys.slice(-3).map(k=>sum(months[k].epargne));
  const avg=last3.length?last3.reduce((a,b)=>a+b,0)/last3.length:0;

  // Objectif
  const pct=savingsGoal>0?Math.min(100,Math.round(totalPatrimoine/savingsGoal*100)):0;
  const remaining=savingsGoal>0?Math.max(0,savingsGoal-totalPatrimoine):0;
  const moisR=avg>0&&remaining>0?Math.ceil(remaining/avg):null;

  document.getElementById('app').innerHTML=`
    <div class="wrap" style="padding-bottom:80px;">
      <!-- HEADER PATRIMOINE -->
      <div style="background:#1a1a2e;border-radius:16px;padding:20px;margin-bottom:16px;color:#fff;">
        <div style="font-size:12px;opacity:0.6;margin-bottom:4px;">Patrimoine brut</div>
        <div style="font-size:32px;font-weight:700;margin-bottom:4px;">${totalPatrimoine.toLocaleString('fr-FR')} €</div>
        <div style="font-size:13px;${totalPerf>=0?'color:#97c459':'color:#f09595'}">
          ${totalPerf>=0?'+':''}${fmt(totalPerf)} &nbsp; ${totalPerf>=0?'+':''}${Math.abs(perfPct).toFixed(2)}%
          <span style="opacity:0.5;color:#fff;margin-left:6px;">Performance totale</span>
        </div>
      </div>

      <!-- STATS RAPIDES -->
      <div class="stat-grid" style="margin-bottom:16px;">
        <div class="stat-box"><div class="lbl">Actifs</div><div class="val">${assets.length}</div></div>
        <div class="stat-box"><div class="lbl">Épargne / mois (moy.)</div><div class="val">${fmt(avg)}</div></div>
      </div>

      <!-- RÉPARTITION -->
      ${assets.length>0?`
      <div class="chart-section">
        <h2>Répartition du patrimoine</h2>
        <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
          <div style="flex-shrink:0;width:160px;height:160px;"><canvas id="c-donut"></canvas></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
            ${typeEntries.map(([type,val])=>{
              const color=ASSET_COLORS[type]||'#9a9483';
              const pctT=totalPatrimoine>0?Math.round(val/totalPatrimoine*100):0;
              return `<div>
                <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:3px;">
                  <span style="display:flex;align-items:center;gap:6px;"><span style="width:10px;height:10px;border-radius:50%;background:${color};display:inline-block;"></span>${type}</span>
                  <span style="font-weight:600;">${pctT}%</span>
                </div>
                <div style="height:5px;background:var(--line);border-radius:3px;overflow:hidden;">
                  <div style="height:100%;background:${color};width:${pctT}%;"></div>
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>`:''}

      <!-- OBJECTIF -->
      <div class="goal-card">
        <h2>🎯 Objectif patrimoine</h2>
        ${savingsGoal>0?`
          <div style="display:flex;justify-content:space-between;font-size:13px;"><span>${fmt(totalPatrimoine)}</span><span>${fmt(savingsGoal)}</span></div>
          <div class="goal-bar"><div class="goal-fill" style="width:${pct}%"></div></div>
          <div style="font-size:13px;color:var(--ink2);">${pct}% atteint${moisR?' · encore ~'+moisR+' mois avec la moyenne actuelle':' · objectif atteint 🎉'}</div>
        `:'<p style="font-size:13px;color:var(--ink2);margin:0 0 4px;">Définis un objectif pour suivre ta progression.</p>'}
        <div class="goal-row">
          <input type="number" step="100" placeholder="Objectif en €" value="${savingsGoal||''}" id="goal-input">
          <button onclick="setGoal()">Définir</button>
        </div>
      </div>

      <!-- LISTE ACTIFS -->
      <section>
        <h2>Mes actifs <span class="pill green">${assets.length}</span></h2>
        ${assets.length===0?'<p class="small">Ajoute tes placements pour suivre ton patrimoine.</p>':''}
        <div style="display:flex;flex-direction:column;gap:8px;">
          ${assets.map(a=>{
            const color=ASSET_COLORS[a.type]||'#9a9483';
            const pctA=totalPatrimoine>0?Math.round((parseFloat(a.value)||0)/totalPatrimoine*100):0;
            const perf=parseFloat(a.perf)||0;
            return `<div style="background:var(--bg);border-radius:10px;padding:12px 14px;">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
                <div style="width:36px;height:36px;border-radius:10px;background:${color}22;display:flex;align-items:center;justify-content:center;font-size:16px;color:${color};font-weight:700;flex-shrink:0;">${(a.label||'?')[0].toUpperCase()}</div>
                <div style="flex:1;">
                  <input type="text" value="${(a.label||'').replace(/"/g,'&quot;')}" placeholder="Nom du placement" oninput="updateAsset(${a.id},'label',this.value)" style="width:100%;border:none;background:transparent;font-size:14px;font-weight:600;color:var(--ink);padding:0;" onblur="saveSettings()">
                  <select onchange="updateAsset(${a.id},'type',this.value); saveSettings(); render();" style="border:none;background:transparent;font-size:12px;color:var(--ink2);padding:0;cursor:pointer;">
                    ${ASSET_TYPES.map(t=>`<option value="${t}" ${a.type===t?'selected':''}>${t}</option>`).join('')}
                  </select>
                </div>
                <button onclick="deleteAsset(${a.id})" style="background:none;border:none;color:var(--ink3);cursor:pointer;font-size:18px;padding:2px 6px;">×</button>
              </div>
              <div style="display:flex;gap:8px;align-items:center;">
                <div style="flex:1;">
                  <div style="font-size:11px;color:var(--ink2);margin-bottom:2px;">Valeur actuelle</div>
                  <div style="display:flex;align-items:center;gap:4px;">
                    <input type="number" step="0.01" value="${a.value||0}" oninput="updateAsset(${a.id},'value',this.value)" onblur="saveSettings();render();" style="width:110px;border:0.5px solid var(--line);border-radius:6px;padding:5px 8px;font-size:13px;font-weight:600;background:#fff;">
                    <span style="font-size:11px;color:var(--ink3);">€ · ${pctA}%</span>
                  </div>
                </div>
                <div>
                  <div style="font-size:11px;color:var(--ink2);margin-bottom:2px;">+/- value</div>
                  <div style="display:flex;align-items:center;gap:4px;">
                    <input type="number" step="0.01" value="${a.perf||0}" oninput="updateAsset(${a.id},'perf',this.value)" onblur="saveSettings();render();" style="width:90px;border:0.5px solid var(--line);border-radius:6px;padding:5px 8px;font-size:13px;font-weight:600;background:#fff;color:${perf>=0?'var(--green)':'var(--red)'}">
                    <span style="font-size:11px;${perf>=0?'color:var(--green)':'color:var(--red)'}">€</span>
                  </div>
                </div>
              </div>
            </div>`;
          }).join('')}
        </div>
        <button class="addrow" onclick="addAsset()" style="margin-top:10px;">+ Ajouter un actif</button>
      </section>

      <!-- GRAPHIQUE ÉPARGNE MENSUELLE -->
      <div class="chart-section"><h2>Épargne ajoutée par mois</h2><div class="chart-wrap"><canvas id="c5"></canvas></div></div>
    </div>
    ${nav}`;

  // Donut
  if(assets.length>0){
    charts['donut']=new Chart(document.getElementById('c-donut'),{type:'doughnut',data:{
      labels:typeEntries.map(([t])=>t),
      datasets:[{data:typeEntries.map(([,v])=>v),backgroundColor:typeEntries.map(([t])=>ASSET_COLORS[t]||'#9a9483'),borderWidth:0}]
    },options:{plugins:{legend:{display:false}},cutout:'65%'}});
  }

  // Barres épargne mensuelle
  charts.c5=new Chart(document.getElementById('c5'),{type:'bar',data:{
    labels:history.map(h=>h.label),
    datasets:[{label:'Épargne du mois',data:history.map(h=>h.ajout),backgroundColor:'#97c459',borderWidth:0,borderRadius:6}]
  },options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
}

function setGoal(){
  const val=parseFloat(document.getElementById('goal-input').value)||0;
  savingsGoal=val; saveSettings(); render();
}
</script>
</body>
</html>
