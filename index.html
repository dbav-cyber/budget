<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Budget">
<meta name="theme-color" content="#f6f5f1">
<title>Mon Budget</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:#f6f5f1; --card:#ffffff; --line:#e4e1d8; --line-strong:#cfcabb;
  --ink:#23211c; --ink2:#6b6657; --ink3:#9a9483;
  --green:#3b6d11; --green-bg:#eaf3de; --green-line:#97c459;
  --red:#a32d2d; --red-bg:#fcebeb; --red-line:#f09595;
  --amber:#854f0b; --amber-bg:#faeeda; --amber-line:#ef9f27;
  --blue:#185fa5; --blue-bg:#e6f1fb; --blue-line:#85b7eb;
  --dark-header:#1a1a2e;
  --radius:10px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
body.dark {
  --bg:#111318; --card:#1e2028; --line:#2e3040; --line-strong:#3a3d50;
  --ink:#e8e6e0; --ink2:#9a97a8; --ink3:#5a5870;
  --green-bg:#162610; --green-line:#2d5a14;
  --red-bg:#2a1010; --red-line:#5a1a1a;
  --amber-bg:#2a1f08; --amber-line:#5a3a0a;
  --blue-bg:#0d1e35; --blue-line:#1a3a60;
  --dark-header:#0d0f1a;
}
*{box-sizing:border-box;transition:background-color 0.2s,color 0.2s,border-color 0.2s;}
body{margin:0;background:var(--bg);color:var(--ink);padding:20px 12px 90px;}
.wrap{max-width:760px;margin:0 auto;}
h1{font-size:22px;font-weight:600;margin:0 0 4px;}
.sub{color:var(--ink2);font-size:14px;margin:0 0 20px;}
/* Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:0.5px solid var(--line);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0px);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;background:none;border:none;cursor:pointer;font-size:10px;color:var(--ink3);gap:3px;}
.nav-btn .icon{font-size:22px;line-height:1;}
.nav-btn.active{color:var(--green);}
/* Topbar */
.topbar{display:flex;align-items:center;gap:8px;margin-bottom:20px;}
.topbar select{flex:1;border:0.5px solid var(--line-strong);background:var(--card);border-radius:var(--radius);padding:8px 12px;font-size:14px;color:var(--ink);cursor:pointer;}
.topbar button{border:0.5px solid var(--line-strong);background:var(--card);border-radius:var(--radius);padding:8px 12px;font-size:13px;color:var(--ink);cursor:pointer;white-space:nowrap;}
.topbar button:hover{background:var(--line);}
.save-status{font-size:12px;color:var(--ink3);white-space:nowrap;}
/* Health Score */
.health-card{border-radius:14px;padding:16px 18px;margin-bottom:16px;display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;}
.health-score{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0;}
.health-details{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.health-item{font-size:12px;}
.health-item .hl{color:var(--ink2);margin-bottom:1px;}
.health-item .hv{font-weight:600;font-size:13px;}
/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px;}
.metric{background:var(--card);border:0.5px solid var(--line);border-radius:12px;padding:14px 16px;}
.metric .lbl{font-size:12px;color:var(--ink2);margin-bottom:4px;}
.metric .val{font-size:20px;font-weight:600;}
.metric.pos .val{color:var(--green);}
.metric.neg .val{color:var(--red);}
/* Sections */
section{background:var(--card);border:0.5px solid var(--line);border-radius:12px;padding:16px 14px;margin-bottom:16px;}
section h2{font-size:15px;font-weight:600;margin:0 0 10px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
/* Budget prévisionnel bar */
.budget-bar{margin-bottom:10px;}
.budget-bar-track{height:5px;background:var(--line);border-radius:3px;overflow:hidden;}
.budget-bar-fill{height:100%;border-radius:3px;transition:width 0.4s;}
.budget-bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--ink2);margin-bottom:3px;}
/* Rows */
.rows{display:flex;flex-direction:column;gap:8px;}
.row{display:flex;align-items:center;gap:6px;min-width:0;flex-wrap:nowrap;}
.row input[type=text]{flex:1;min-width:0;border:0.5px solid var(--line);border-radius:8px;padding:9px 10px;font-size:14px;background:var(--bg);color:var(--ink);}
.row input[type=number]{width:96px;flex-shrink:0;border:0.5px solid var(--line);border-radius:8px;padding:9px 8px;font-size:14px;text-align:right;background:var(--bg);color:var(--ink);}
.row select{flex-shrink:0;max-width:110px;border:0.5px solid var(--line);border-radius:8px;padding:9px 6px;font-size:12px;background:var(--bg);color:var(--ink2);}
.row .del{flex-shrink:0;background:none;border:none;color:var(--ink3);cursor:pointer;font-size:18px;padding:4px 6px;line-height:1;}
.row .del:hover{color:var(--red);}
.copy-btn{flex-shrink:0;background:none;border:none;color:var(--ink3);cursor:pointer;font-size:14px;padding:4px 5px;line-height:1;}
.copy-btn:hover{color:var(--blue);}
.copy-btn.ok{color:var(--green);}
.note-btn{flex-shrink:0;background:none;border:none;cursor:pointer;font-size:13px;padding:4px 5px;line-height:1;color:var(--ink3);}
.note-btn.has-note{color:var(--amber);}
.note-btn:hover{color:var(--blue);}
.note-input{width:100%;border:none;border-top:0.5px solid var(--line);background:var(--amber-bg);border-radius:0 0 8px 8px;padding:6px 10px;font-size:12.5px;color:var(--ink);margin-top:2px;resize:none;}
.row-wrap{display:flex;flex-direction:column;margin-bottom:2px;}
.addrow{margin-top:8px;background:none;border:0.5px dashed var(--line-strong);border-radius:8px;padding:7px 10px;font-size:13px;color:var(--ink2);cursor:pointer;width:100%;text-align:left;}
.addrow:hover{background:var(--line);}
.total{display:flex;justify-content:space-between;border-top:0.5px solid var(--line);margin-top:10px;padding-top:10px;font-size:14px;font-weight:600;}
/* Pills */
.pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;}
.pill.green{background:var(--green-bg);color:var(--green);}
.pill.amber{background:var(--amber-bg);color:var(--amber);}
.pill.red{background:var(--red-bg);color:var(--red);}
/* Alerts */
.alert{display:flex;gap:8px;align-items:flex-start;border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:16px;}
.alert.ok{background:var(--green-bg);border:0.5px solid var(--green-line);color:var(--green);}
.alert.warn{background:var(--amber-bg);border:0.5px solid var(--amber-line);color:var(--amber);}
.alert.bad{background:var(--red-bg);border:0.5px solid var(--red-line);color:var(--red);}
/* Footer */
.footer{text-align:center;margin-top:24px;}
.reset{font-size:12px;color:var(--ink3);background:none;border:none;cursor:pointer;text-decoration:underline;}
.small{font-size:11.5px;color:var(--ink3);}
.savings-note{font-size:12.5px;color:var(--ink2);margin-top:8px;}
/* Charts */
.chart-section{background:var(--card);border:0.5px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:16px;}
.chart-section h2{font-size:15px;font-weight:600;margin:0 0 14px;}
.chart-wrap{position:relative;height:220px;}
/* Catbar */
.catbreak{display:flex;flex-direction:column;gap:6px;margin-top:12px;}
.catbar-row .top{display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink2);margin-bottom:3px;}
.catbar-track{height:6px;background:var(--bg);border-radius:4px;overflow:hidden;}
.catbar-fill{height:100%;background:var(--blue-line);}
/* Epargne */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-box{background:var(--card);border:0.5px solid var(--line);border-radius:10px;padding:12px 14px;}
.stat-box .lbl{font-size:11px;color:var(--ink2);margin-bottom:4px;}
.stat-box .val{font-size:18px;font-weight:600;}
.goal-card{background:var(--green-bg);border:0.5px solid var(--green-line);border-radius:12px;padding:16px 18px;margin-bottom:16px;}
.goal-card h2{font-size:15px;font-weight:600;margin:0 0 10px;color:var(--green);}
.goal-bar{height:10px;background:rgba(0,0,0,0.08);border-radius:5px;overflow:hidden;margin:8px 0;}
.goal-fill{height:100%;background:var(--green);border-radius:5px;transition:width 0.5s;}
.goal-row{display:flex;align-items:center;gap:8px;margin-top:12px;}
.goal-row input{flex:1;border:0.5px solid var(--green-line);border-radius:8px;padding:8px 10px;font-size:14px;background:var(--card);color:var(--ink);}
.goal-row button{background:var(--green);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;}
/* Asset cards */
.asset-card{background:var(--bg);border-radius:12px;padding:14px;margin-bottom:10px;}
.asset-history-mini{display:flex;gap:3px;align-items:flex-end;height:28px;margin-top:6px;}
.asset-history-mini .bar{flex:1;background:var(--blue-line);border-radius:2px;min-height:3px;}
/* Login */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;gap:20px;padding:24px;text-align:center;}
.login-icon{width:72px;height:72px;background:var(--green);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;color:#fff;}
.login-btn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:14px 28px;font-size:15px;cursor:pointer;font-weight:600;width:100%;max-width:280px;}
/* Dark toggle */
.dark-btn{background:none;border:0.5px solid var(--line-strong);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:16px;color:var(--ink);}
</style>
</head>
<body>
<div class="wrap" id="app">
  <p style="text-align:center;color:var(--ink2);padding:60px 0;">Chargement...</p>
</div>
<script>
// ── Firebase ──────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:"AIzaSyA9cuO9GzC1pJfGhKRz7rBZtXqHFUhLU8o",
  authDomain:"budget-92cee.firebaseapp.com",
  projectId:"budget-92cee",
  storageBucket:"budget-92cee.firebasestorage.app",
  messagingSenderId:"518937293108",
  appId:"1:518937293108:web:38012a527a65da64e4f561"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

// ── État ──────────────────────────────────────────────────────
let months={}, currentKey=null, currentUser=null;
let activeTab='budget', darkMode=false;
let savingsGoal=0, assets=[], budgetTargets={}, labelColors={};
let charts={};

// ── Constantes ────────────────────────────────────────────────
const MOIS=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const COLORS=["#534AB7","#0F6E56","#993C1D","#993556","#185FA5","#3B6D11","#854F0B","#A32D2D","#26215C","#04342C"];
const ASSET_TYPES=["Retraite (PER)","Immobilier","Bourse / ETF","Livret","Crypto","Autre"];
const ASSET_COLORS={"Retraite (PER)":"#534AB7","Immobilier":"#ef9f27","Bourse / ETF":"#3b6d11","Livret":"#85b7eb","Crypto":"#f09595","Autre":"#9a9483"};
const CATEGORIES=["Alimentation","Sorties / loisirs","Shopping","Transport","Santé","Maison","Abonnements","Autre"];

// ── Utilitaires ───────────────────────────────────────────────
const monthLabel=k=>{ const [y,m]=k.split("-"); return MOIS[parseInt(m,10)-1]+" "+y; };
const fmt=n=>{ n=parseFloat(n)||0; return n.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+" €"; };
const sum=arr=>arr.reduce((a,b)=>a+(parseFloat(b.montant)||0),0);
const autoColor=label=>{ let h=0; for(const c of (label||'_').toLowerCase()) h=(h*31+c.charCodeAt(0))>>>0; return COLORS[h%COLORS.length]; };
const dotColor=label=>labelColors[label]||autoColor(label);
function setLabelColor(label,color){ labelColors[label]=color; saveSettings(); }

function emptyMonth(solde,epargne){
  return {
    soldeDebut:solde||0,
    revenus:[{label:"Salaire",montant:0}],
    fixes:[{label:"Loyer",montant:0}],
    epargne:[{label:"Epargne",montant:0}],
    cb:[],
    autresVariables:[{label:"Especes",montant:0}],
    miseDeCotePrecedente:epargne||0
  };
}

function copyMonthLines(prev){
  return {
    soldeDebut:0,
    revenus: JSON.parse(JSON.stringify(prev.revenus)),
    fixes:   JSON.parse(JSON.stringify(prev.fixes)),
    epargne: JSON.parse(JSON.stringify(prev.epargne)),
    cb:[], autresVariables:[],
    miseDeCotePrecedente:0
  };
}

function computeTotals(d){
  const soldeDebut=parseFloat(d.soldeDebut)||0;
  const totalRevenusBrut=sum(d.revenus);
  const totalFixes=sum(d.fixes);
  const totalEpargne=sum(d.epargne);
  const totalCB=sum(d.cb);
  const totalAutresVar=sum(d.autresVariables);
  const totalVariable=totalCB+totalAutresVar;
  const resteApresFixe=totalRevenusBrut+soldeDebut-totalFixes-totalEpargne;
  const soldeFin=resteApresFixe-totalVariable;
  const miseDeCoteTotal=(parseFloat(d.miseDeCotePrecedente)||0)+totalEpargne;
  return {totalRevenusBrut,totalFixes,totalEpargne,totalCB,totalAutresVar,totalVariable,resteApresFixe,soldeFin,miseDeCoteTotal};
}

function catBreakdown(cb){
  const map={};
  cb.forEach(i=>{ const c=i.categorie||"Non cat."; map[c]=(map[c]||0)+(parseFloat(i.montant)||0); });
  return Object.entries(map).sort((a,b)=>b[1]-a[1]);
}

function computeAssetValue(asset){
  const initial=parseFloat(asset.initialValue)||0;
  if(!asset.linkedLabel) return {current:parseFloat(asset.value)||0,added:0};
  let added=0;
  Object.values(months).forEach(m=>{
    m.epargne.forEach(line=>{
      if((line.label||'').trim().toLowerCase()===(asset.linkedLabel||'').trim().toLowerCase())
        added+=parseFloat(line.montant)||0;
    });
  });
  return {current:initial+added,added};
}

function healthScore(d,t){
  let score=100;
  const txEpargne=t.totalRevenusBrut>0?t.totalEpargne/t.totalRevenusBrut:0;
  const txFixes=t.totalRevenusBrut>0?t.totalFixes/t.totalRevenusBrut:0;
  if(txEpargne<0.05) score-=25;
  else if(txEpargne<0.10) score-=10;
  if(txFixes>0.60) score-=20;
  else if(txFixes>0.45) score-=10;
  if(t.soldeFin<0) score-=30;
  else if(t.soldeFin<100) score-=10;
  if((parseFloat(d.soldeDebut)||0)<0) score-=15;
  return Math.max(0,Math.min(100,score));
}

// ── Dark mode ─────────────────────────────────────────────────
function toggleDark(){
  darkMode=!darkMode;
  document.body.classList.toggle('dark',darkMode);
  localStorage.setItem('dark',darkMode?'1':'0');
}
function initDark(){ darkMode=localStorage.getItem('dark')==='1'; document.body.classList.toggle('dark',darkMode); }
initDark();

// ── Auth ──────────────────────────────────────────────────────
auth.onAuthStateChanged(user=>{ if(user){currentUser=user;loadData();}else{currentUser=null;showLogin();} });

function showLogin(){
  document.getElementById('app').innerHTML=`
    <div class="login-screen">
      <div class="login-icon">&#8364;</div>
      <h1>Mon Budget</h1>
      <p style="color:var(--ink2);margin:0;max-width:280px;">Connecte-toi pour synchroniser ton budget sur tous tes appareils.</p>
      <button class="login-btn" onclick="loginGoogle()">Continuer avec Google</button>
      <p style="color:var(--red);font-size:13px;display:none;" id="login-error"></p>
    </div>`;
}
function loginGoogle(){
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>{
    const el=document.getElementById('login-error');
    if(el){el.style.display='block';el.textContent='Erreur : '+e.message;}
  });
}

// ── Firebase data ─────────────────────────────────────────────
async function loadData(){
  try{
    const snap=await db.collection("budgets").doc(currentUser.uid).collection("data").doc("months").get();
    if(snap.exists) months=snap.data().months||{};
    else months={};
    const sg=await db.collection("budgets").doc(currentUser.uid).collection("data").doc("settings").get();
    if(sg.exists){ savingsGoal=sg.data().savingsGoal||0; assets=sg.data().assets||[]; budgetTargets=sg.data().budgetTargets||{}; labelColors=sg.data().labelColors||{}; }
  }catch(e){ months={}; }
  const keys=Object.keys(months).sort();
  if(!keys.length){
    const now=new Date();
    const k=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
    months[k]=emptyMonth(0,0); currentKey=k;
  } else { currentKey=keys[keys.length-1]; }
  render();
}

async function save(){
  if(!currentUser) return;
  showSaveStatus('saving');
  try{ await db.collection("budgets").doc(currentUser.uid).collection("data").doc("months").set({months}); showSaveStatus('saved'); }
  catch(e){ showSaveStatus('error'); }
}
async function saveSettings(){
  if(!currentUser) return;
  try{ await db.collection("budgets").doc(currentUser.uid).collection("data").doc("settings").set({savingsGoal,assets,budgetTargets,labelColors}); }catch(e){}
}

function showSaveStatus(s){
  const el=document.getElementById('save-status');
  if(!el) return;
  if(s==='saving'){el.textContent='Sauvegarde...';el.style.color='var(--ink3)';}
  else if(s==='saved'){el.textContent='Sauvegarder';el.style.color='var(--green)';setTimeout(()=>{if(el)el.textContent='';},3000);}
  else{el.textContent='Erreur';el.style.color='var(--red)';}
}

// ── Navigation ────────────────────────────────────────────────
function switchTab(tab){ Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}}); charts={}; activeTab=tab; render(); }
function changeMonth(k){ currentKey=k; render(); }

function addNewMonth(){
  const keys=Object.keys(months).sort();
  const [y,m]=keys[keys.length-1].split("-").map(Number);
  let ny=y,nm=m+1; if(nm>12){nm=1;ny++;}
  const nk=ny+"-"+String(nm).padStart(2,"0");
  if(!months[nk]){
    const prevData=months[keys[keys.length-1]];
    const prevTotals=computeTotals(prevData);
    const newM=copyMonthLines(prevData);
    newM.soldeDebut=prevTotals.soldeFin;
    newM.miseDeCotePrecedente=prevTotals.miseDeCoteTotal;
    months[nk]=newM;
    save();
  }
  currentKey=nk; render();
}

function nav(){ return `<nav class="bottom-nav">
  <button class="nav-btn ${activeTab==='budget'?'active':''}" onclick="switchTab('budget')"><span class="icon">&#128176;</span>Budget</button>
  <button class="nav-btn ${activeTab==='graphs'?'active':''}" onclick="switchTab('graphs')"><span class="icon">&#128202;</span>Graphiques</button>
  <button class="nav-btn ${activeTab==='epargne'?'active':''}" onclick="switchTab('epargne')"><span class="icon">&#127974;</span>Epargne</button>
</nav>`; }

function render(){
  if(activeTab==='budget') renderBudget();
  else if(activeTab==='graphs') renderGraphs();
  else renderEpargne();
}

// ── Row helpers ───────────────────────────────────────────────
function rowHTML(section,idx,item,withCat){
  const color=dotColor(item.label);
  const safeLabel=(item.label||'').replace(/'/g,'').replace(/"/g,'').replace(/`/g,'');
  const cat=withCat?`<select onchange="updateField('${section}',${idx},'categorie',this.value)">
    <option value="">Cat...</option>
    ${CATEGORIES.map(c=>`<option value="${c}" ${item.categorie===c?'selected':''}>${c}</option>`).join('')}
  </select>`:'';
  const hasNote=!!(item.note&&item.note.trim());
  const noteId=`note-${section}-${idx}`;
  return `<div class="row-wrap">
    <div class="row">
      <span style="position:relative;flex-shrink:0;" title="Changer la couleur">
        <span style="display:block;width:14px;height:14px;border-radius:50%;background:${color};cursor:pointer;border:1.5px solid transparent;" onclick="document.getElementById('cp-${section}-${idx}').click()"></span>
        <input type="color" id="cp-${section}-${idx}" value="${color}" style="position:absolute;opacity:0;width:0;height:0;pointer-events:none;"
          oninput="document.getElementById('cp-${section}-${idx}').closest('.row').querySelector('span span').style.background=this.value"
          onchange="setLabelColor('${safeLabel}',this.value);render();">
      </span>
      <input type="text" value="${(item.label||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}" placeholder="Libelle"
        oninput="updateField('${section}',${idx},'label',this.value)">
      ${cat}
      <input type="number" step="0.01" value="${item.montant||0}"
        oninput="updateField('${section}',${idx},'montant',this.value)" onblur="render()">
      <button class="note-btn ${hasNote?'has-note':''}" onclick="toggleNote('${noteId}')" title="${hasNote?item.note:'Ajouter une note'}">&#128221;</button>
      <button class="copy-btn" onclick="copyRow('${(item.label||'').replace(/'/g,'').replace(/"/g,'')}',${item.montant||0},this)">&#10696;</button>
      <button class="del" onclick="deleteRow('${section}',${idx})">x</button>
    </div>
    <div id="${noteId}" style="display:${hasNote?'block':'none'};">
      <input class="note-input" type="text"
        value="${(item.note||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}"
        placeholder="Ajouter une note..."
        oninput="updateField('${section}',${idx},'note',this.value)"
        onblur="save()">
    </div>
  </div>`;
}

function toggleNote(id){
  const el=document.getElementById(id);
  if(!el) return;
  const visible=el.style.display!=='none';
  el.style.display=visible?'none':'block';
  if(!visible) setTimeout(()=>{ const inp=el.querySelector('input'); if(inp) inp.focus(); },50);
}

function updateField(section,idx,field,value){ months[currentKey][section][idx][field]=value; save(); }
function deleteRow(section,idx){ months[currentKey][section].splice(idx,1); save(); render(); }
function addRow(section){ months[currentKey][section].push({label:"",montant:0,...(section==='cb'?{categorie:""}:{})}); save(); render(); }
function updateSoldeDebut(v){ months[currentKey].soldeDebut=v; save(); }
function updateMiseDeCote(v){ months[currentKey].miseDeCotePrecedente=v; save(); }
function copyRow(label,montant,btn){
  const text=label+' : '+(parseFloat(montant)||0).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' EUR';
  navigator.clipboard.writeText(text).then(()=>{ btn.textContent='ok'; btn.classList.add('ok'); setTimeout(()=>{btn.textContent='&#10696;';btn.classList.remove('ok');},1500); });
}
function exportData(){
  const a=document.createElement('a');
  a.href='data:application/json,'+encodeURIComponent(JSON.stringify(months,null,2));
  a.download='budget-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}
function importData(input){
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=async e=>{ try{ months=JSON.parse(e.target.result); const keys=Object.keys(months).sort(); currentKey=keys[keys.length-1]; await save(); render(); }catch(err){alert("Fichier invalide.");} };
  r.readAsText(file); input.value="";
}
function resetMonth(){ if(!confirm("Reinitialiser ce mois ?")) return; months[currentKey]=emptyMonth(0,0); save(); render(); }

// ── ASSET helpers ─────────────────────────────────────────────
function addAsset(){ assets.push({id:Date.now(),label:"",type:"Bourse / ETF",value:0,initialValue:0,perf:0,linkedLabel:"",history:[]}); saveSettings(); render(); }
function deleteAsset(id){ assets=assets.filter(a=>a.id!==id); saveSettings(); render(); }
function updateAsset(id,field,value){
  const a=assets.find(x=>x.id===id); if(!a) return;
  a[field]=(['value','initialValue','perf'].includes(field))?(parseFloat(value)||0):value;
}
function snapshotAsset(id){
  const a=assets.find(x=>x.id===id); if(!a) return;
  const val=a.linkedLabel?computeAssetValue(a).current:(parseFloat(a.value)||0);
  if(!a.history) a.history=[];
  a.history.push({date:new Date().toISOString().slice(0,10),value:val});
  saveSettings(); render();
}

// ── BUDGET TARGETS ────────────────────────────────────────────
function updateTarget(field,value){ budgetTargets[field]=parseFloat(value)||0; saveSettings(); }

function budgetBarHTML(label,spent,targetKey){
  const target=budgetTargets[targetKey]||0;
  if(!target) return '';
  const pct=Math.min(100,Math.round(spent/target*100));
  const over=spent>target;
  const color=over?'var(--red)':pct>80?'var(--amber)':'var(--green)';
  return `<div class="budget-bar">
    <div class="budget-bar-label">
      <span>${label}</span>
      <span style="color:${color};font-weight:600;">${fmt(spent)} / ${fmt(target)}</span>
    </div>
    <div class="budget-bar-track"><div class="budget-bar-fill" style="width:${pct}%;background:${color};"></div></div>
  </div>`;
}

// ── ONGLET GRAPHIQUES ─────────────────────────────────────────
function renderGraphs(){
  const keys=Object.keys(months).sort();
  const d=months[currentKey];
  const t=computeTotals(d);
  const cbCats=catBreakdown(d.cb);
  const compareKey=window._compareKey&&months[window._compareKey]?window._compareKey:null;
  const d2=compareKey?months[compareKey]:null;
  const t2=d2?computeTotals(d2):null;

  document.getElementById('app').innerHTML=`
    <div class="wrap" style="padding-bottom:90px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <h1>Graphiques</h1>
        <button class="dark-btn" onclick="toggleDark()">${darkMode?'&#9728;':'&#9790;'}</button>
      </div>
      <div class="topbar" style="flex-wrap:wrap;">
        <select onchange="changeMonth(this.value)">${keys.map(k=>`<option value="${k}" ${k===currentKey?'selected':''}>${monthLabel(k)}</option>`).join('')}</select>
        <select onchange="window._compareKey=this.value;renderGraphs();" title="Comparer avec...">
          <option value="">Comparer avec...</option>
          ${keys.filter(k=>k!==currentKey).map(k=>`<option value="${k}" ${compareKey===k?'selected':''}>${monthLabel(k)}</option>`).join('')}
        </select>
      </div>

      <div class="chart-section"><h2>Repartition des depenses</h2><div class="chart-wrap"><canvas id="c1"></canvas></div></div>
      <div class="chart-section">
        <h2>Recettes vs Depenses${compareKey?' — Comparaison':''}</h2>
        <div class="chart-wrap"><canvas id="c2"></canvas></div>
      </div>
      <div class="chart-section"><h2>CB par categorie</h2><div class="chart-wrap"><canvas id="c3"></canvas></div></div>
      <div class="chart-section"><h2>Evolution mensuelle</h2><div class="chart-wrap"><canvas id="c4"></canvas></div></div>
    </div>
    ${nav()}`;

  // Donut depenses
  charts.c1=new Chart(document.getElementById('c1'),{type:'doughnut',data:{
    labels:['Charges fixes','Epargne','Depenses CB','Autres'],
    datasets:[{data:[t.totalFixes,t.totalEpargne,t.totalCB,t.totalAutresVar],
      backgroundColor:['#ef9f27','#97c459','#f09595','#85b7eb'],borderWidth:0}]
  },options:{plugins:{legend:{position:'bottom',labels:{color:darkMode?'#e8e6e0':'#23211c'}}},cutout:'60%'}});

  // Bar recettes vs depenses (avec comparaison)
  const labels2=['Recettes','Fixes','Epargne','Variables','Solde fin'];
  const ds2=[{
    label:compareKey?monthLabel(currentKey):'Mois actuel',
    data:[t.totalRevenusBrut,t.totalFixes,t.totalEpargne,t.totalVariable,t.soldeFin],
    backgroundColor:['#97c459','#ef9f27','#85b7eb','#f09595',t.soldeFin>=0?'#3b6d11':'#a32d2d'],
    borderWidth:0,borderRadius:4
  }];
  if(t2) ds2.push({
    label:monthLabel(compareKey),
    data:[t2.totalRevenusBrut,t2.totalFixes,t2.totalEpargne,t2.totalVariable,t2.soldeFin],
    backgroundColor:['#97c45988','#ef9f2788','#85b7eb88','#f0959588',t2.soldeFin>=0?'#3b6d1188':'#a32d2d88'],
    borderWidth:0,borderRadius:4
  });
  charts.c2=new Chart(document.getElementById('c2'),{type:'bar',data:{labels:labels2,datasets:ds2},
    options:{plugins:{legend:{display:!!compareKey,labels:{color:darkMode?'#e8e6e0':'#23211c'}}},scales:{x:{ticks:{color:darkMode?'#9a97a8':'#6b6657'}},y:{beginAtZero:true,ticks:{color:darkMode?'#9a97a8':'#6b6657'}}}}});

  // CB categ
  const cbL=cbCats.map(([k])=>k);
  const cbV=cbCats.map(([,v])=>v);
  charts.c3=new Chart(document.getElementById('c3'),{type:'bar',data:{
    labels:cbL.length?cbL:['Aucune depense CB'],
    datasets:[{data:cbV.length?cbV:[0],backgroundColor:'#85b7eb',borderWidth:0,borderRadius:4}]
  },options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{color:darkMode?'#9a97a8':'#6b6657'}},y:{ticks:{color:darkMode?'#9a97a8':'#6b6657'}}}}});

  // Evolution mensuelle (solde fin + epargne)
  const allKeys=Object.keys(months).sort();
  const evoLabels=allKeys.map(monthLabel);
  const evoSolde=allKeys.map(k=>computeTotals(months[k]).soldeFin);
  const evoEpargne=allKeys.map(k=>sum(months[k].epargne));
  charts.c4=new Chart(document.getElementById('c4'),{type:'line',data:{
    labels:evoLabels,
    datasets:[
      {label:'Solde fin de mois',data:evoSolde,borderColor:'#3b6d11',backgroundColor:'rgba(59,109,17,0.08)',fill:true,tension:0.3,pointRadius:4},
      {label:'Epargne mensuelle',data:evoEpargne,borderColor:'#85b7eb',backgroundColor:'rgba(133,183,235,0.08)',fill:true,tension:0.3,pointRadius:4}
    ]
  },options:{plugins:{legend:{position:'bottom',labels:{color:darkMode?'#e8e6e0':'#23211c'}}},scales:{y:{beginAtZero:true,ticks:{color:darkMode?'#9a97a8':'#6b6657'}},x:{ticks:{color:darkMode?'#9a97a8':'#6b6657'}}}}});
}

// ── ONGLET EPARGNE ────────────────────────────────────────────

  const totalPatrimoine=assetsWithValues.reduce((s,a)=>s+a.currentValue,0);
  const totalPerf=assets.reduce((s,a)=>s+(parseFloat(a.perf)||0),0);
  const perfPct=(totalPatrimoine-totalPerf)>0?(totalPerf/(totalPatrimoine-totalPerf)*100):0;

  const byType={};
  assetsWithValues.forEach(a=>{ const t=a.type||"Autre"; byType[t]=(byType[t]||0)+a.currentValue; });

        <div class="stat-box"><div class="lbl">Actifs</div><div class="val">${assets.length}</div></div>

      ${assetsWithValues.length>0?`
      <div class="chart-section">
        <h2>Repartition du patrimoine</h2>
        <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
          <div style="flex-shrink:0;width:160px;height:160px;"><canvas id="c-donut"></canvas></div>
          <div style="flex:1;min-width:160px;display:flex;flex-direction:column;gap:8px;">
            ${typeEntries.map(([type,val])=>{
              const color=ASSET_COLORS[type]||'#9a9483';
              const p=totalPatrimoine>0?Math.round(val/totalPatrimoine*100):0;
              return `<div>
                <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;">
                  <span style="display:flex;align-items:center;gap:6px;"><span style="width:10px;height:10px;border-radius:50%;background:${color};display:inline-block;"></span>${type}</span>
                  <span style="font-weight:600;">${p}% - ${fmt(val)}</span>
                </div>
                <div style="height:5px;background:var(--line);border-radius:3px;overflow:hidden;"><div style="height:100%;background:${color};width:${p}%;"></div></div>

          </div>

          <div class="goal-bar"><div class="goal-fill" style="width:${pct}%;"></div></div>
          <div style="font-size:13px;color:var(--ink2);">${pct}% atteint${moisR?' - encore '+moisR+' mois':' - objectif atteint !'}</div>
        `:'<p style="font-size:13px;color:var(--ink2);margin:0 0 4px;">Definis un objectif pour suivre ta progression.</p>'}

          ${assetsWithValues.map(a=>{
            const color=ASSET_COLORS[a.type]||'#9a9483';
            const pctA=totalPatrimoine>0?Math.round(a.currentValue/totalPatrimoine*100):0;
            const perf=parseFloat(a.perf)||0;
            const rendement=a.initialValue>0?((perf/a.initialValue)*100):0;
            const hist=a.history||[];
            const maxHist=hist.length?Math.max(...hist.map(h=>h.value)):1;
            return `<div class="asset-card">
              <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;">
                <div style="width:36px;height:36px;border-radius:10px;background:${color}22;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:${color};flex-shrink:0;">${(a.label||'?')[0].toUpperCase()}</div>
                <div style="flex:1;">
                  <input type="text" value="${(a.label||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}" placeholder="Nom du placement"
                    oninput="updateAsset(${a.id},'label',this.value)"
                    style="width:100%;border:none;background:transparent;font-size:14px;font-weight:600;color:var(--ink);padding:0;" onblur="saveSettings()">
                  <select onchange="updateAsset(${a.id},'type',this.value);saveSettings();render();"
                    style="border:none;background:transparent;font-size:12px;color:var(--ink2);padding:0;cursor:pointer;">
                    ${ASSET_TYPES.map(t=>`<option value="${t}" ${a.type===t?'selected':''}>${t}</option>`).join('')}
                  </select>
                </div>
                <button onclick="deleteAsset(${a.id})" style="background:none;border:none;color:var(--ink3);cursor:pointer;font-size:18px;padding:2px 6px;">x</button>
              </div>

              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
                <div>
                  <div style="font-size:11px;color:var(--ink2);margin-bottom:3px;">Solde initial</div>
                  <input type="number" step="0.01" value="${parseFloat(a.initialValue)||0}"
                    oninput="updateAsset(${a.id},'initialValue',this.value)" onblur="saveSettings();render();"
                    style="width:100%;border:0.5px solid var(--line);border-radius:6px;padding:6px 8px;font-size:13px;background:var(--card);color:var(--ink);">
                </div>
                <div>
                  <div style="font-size:11px;color:var(--ink2);margin-bottom:3px;">Lier a ligne epargne</div>
                  <select onchange="updateAsset(${a.id},'linkedLabel',this.value);saveSettings();render();"
                    style="width:100%;border:0.5px solid var(--line);border-radius:6px;padding:6px 8px;font-size:12px;background:var(--card);color:var(--ink);">
                    <option value="">Manuel</option>
                    ${epargneLabels.map(l=>`<option value="${l}" ${a.linkedLabel===l?'selected':''}>${l}</option>`).join('')}
                  </select>
                </div>
              </div>

              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
                <div style="background:${color}11;border-radius:8px;padding:8px 10px;">
                  <div style="font-size:11px;color:var(--ink2);">${a.linkedLabel?'Valeur auto':'Valeur actuelle'}</div>
                  <div style="font-size:16px;font-weight:700;color:${color};">${fmt(a.currentValue)}</div>
                  ${a.linkedLabel?`<div style="font-size:11px;color:var(--green);">+${fmt(a.addedFromBudget)} depuis budget</div>`:`<input type="number" step="0.01" value="${parseFloat(a.value)||0}" oninput="updateAsset(${a.id},'value',this.value)" onblur="saveSettings();render();" style="width:100%;border:0.5px solid var(--line);border-radius:6px;padding:4px 6px;font-size:12px;background:var(--card);color:var(--ink);margin-top:4px;">`}
                  <div style="font-size:11px;color:var(--ink3);margin-top:2px;">${pctA}% du patrimoine</div>
                </div>
                <div style="background:${perf>=0?'var(--green-bg)':'var(--red-bg)'};border-radius:8px;padding:8px 10px;">
                  <div style="font-size:11px;color:var(--ink2);">+/- value</div>
                  <div style="font-size:16px;font-weight:700;color:${perf>=0?'var(--green)':'var(--red)'};">${perf>=0?'+':''}${fmt(perf)}</div>
                  <div style="font-size:11px;color:${perf>=0?'var(--green)':'var(--red)'};">Rendement : ${rendement>=0?'+':''}${rendement.toFixed(1)}%</div>
                  <input type="number" step="0.01" value="${a.perf||0}" oninput="updateAsset(${a.id},'perf',this.value)" onblur="saveSettings();render();"
                    style="width:100%;border:0.5px solid var(--line);border-radius:6px;padding:4px 6px;font-size:12px;background:var(--card);color:var(--ink);margin-top:4px;">
                </div>
              </div>

              ${hist.length>0?`
              <div>
                <div style="font-size:11px;color:var(--ink2);margin-bottom:4px;">Historique valeur (${hist.length} snapshots)</div>
                <div class="asset-history-mini">
                  ${hist.slice(-12).map(h=>`<div class="bar" style="height:${Math.max(8,Math.round(h.value/maxHist*28))}px;" title="${h.date} : ${fmt(h.value)}"></div>`).join('')}
                </div>
                <div style="font-size:10px;color:var(--ink3);">${hist[0].date} - ${hist[hist.length-1].date}</div>
              </div>`:''}
              <button onclick="snapshotAsset(${a.id})" style="margin-top:8px;background:none;border:0.5px solid var(--line);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--ink2);cursor:pointer;">Enregistrer un snapshot de valeur</button>
            </div>`;
          }).join('')}
        </div>
        <button class="addrow" onclick="addAsset()">+ Ajouter un actif</button>
      </section>

      <!-- EPARGNE MENSUELLE -->
      <div class="chart-section"><h2>Epargne ajoutee par mois</h2><div class="chart-wrap"><canvas id="c5"></canvas></div></div>
    </div>
    ${nav()}`;

  if(assetsWithValues.length>0){
    const ctx=document.getElementById('c-donut');
    if(ctx) charts['donut']=new Chart(ctx,{type:'doughnut',data:{
      labels:typeEntries.map(([t])=>t),
      datasets:[{data:typeEntries.map(([,v])=>v),backgroundColor:typeEntries.map(([t])=>ASSET_COLORS[t]||'#9a9483'),borderWidth:0}]
    },options:{plugins:{legend:{display:false}},cutout:'65%'}});
  }
  const ctx5=document.getElementById('c5');
  if(ctx5) charts.c5=new Chart(ctx5,{type:'bar',data:{
    labels:history.map(h=>h.label),
    datasets:[{label:'Epargne du mois',data:history.map(h=>h.ajout),backgroundColor:'#97c459',borderWidth:0,borderRadius:6}]
  },options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{color:darkMode?'#9a97a8':'#6b6657'}},x:{ticks:{color:darkMode?'#9a97a8':'#6b6657'}}}}});
}

function setGoal(){
  const val=parseFloat(document.getElementById('goal-input').value)||0;
  savingsGoal=val; saveSettings(); render();
}
</script>
</body>
</html>
